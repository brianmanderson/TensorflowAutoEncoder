name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allow manual re-run from the Actions tab

jobs:
  test:
    name: ${{ matrix.backend }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false  # report all three backends even if one fails
      matrix:
        backend: [tensorflow, jax, torch]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install ${{ matrix.backend }} backend
        run: |
          python -m pip install --upgrade pip
          case "${{ matrix.backend }}" in
            tensorflow) pip install tensorflow-cpu ;;
            jax)        pip install "jax[cpu]" ;;
            torch)      pip install torch --index-url https://download.pytorch.org/whl/cpu ;;
          esac

      - name: Install common dependencies
        run: pip install -r requirements.txt

      - name: Show installed versions
        run: |
          python -c "import keras; print('keras', keras.__version__)"
          python -c "import ${{ matrix.backend }}; print('${{ matrix.backend }}', ${{ matrix.backend }}.__version__)"

      - name: Run tests
        env:
          KERAS_BACKEND: ${{ matrix.backend }}
        run: pytest tests/ test_reconstruct_patches.py -v --tb=short
